<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>water sort puzzle</title>

    <script data-cfasync="false" src="https://cmp.gatekeeperconsent.com/min.js"></script>
    <script data-cfasync="false" src="https://the.gatekeeperconsent.com/cmp.min.js"></script>
    <script async src="//www.ezojs.com/ezoic/sa.min.js"></script>
    <script>
      window.ezstandalone = window.ezstandalone || {};
      ezstandalone.cmd = ezstandalone.cmd || [];
    </script>
    <script src="//ezoicanalytics.com/analytics.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
      #shopModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; overflow-y:auto; padding:20px; color:white; text-align:center; }
      .pkg-btn { background: #ff9800; border:none; padding:12px; margin:5px; border-radius:5px; color:white; font-weight:bold; cursor:pointer; width: 180px; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="shopModal">
      <button onclick="closeShop()" style="float:right; background:red; color:white; border:none; padding:10px; cursor:pointer;">X Close</button>
      <h1>Water Sort Shop</h1>
      <h3>Coins</h3>
      <button class="pkg-btn" onclick="buyPackage('c1')">100 Coins (₹9)</button>
      <button class="pkg-btn" onclick="buyPackage('c2')">1000 Coins (₹29)</button>
      <button class="pkg-btn" onclick="buyPackage('c3')">10K Coins (₹99)</button>
      <button class="pkg-btn" onclick="buyPackage('c4')">100K Coins (₹149)</button>
      <button class="pkg-btn" onclick="buyPackage('c5')">10M Coins (₹999)</button>
      <h3>No Ads</h3>
      <button class="pkg-btn" onclick="buyPackage('ads1')">2 Months (₹99)</button>
      <button class="pkg-btn" onclick="buyPackage('ads2')">4 Months (₹149)</button>
      <button class="pkg-btn" onclick="buyPackage('ads3')">6 Months (₹199)</button>
      <button class="pkg-btn" onclick="buyPackage('ads4')">1 Year (₹249)</button>
      <button class="pkg-btn" onclick="buyPackage('ads5')">Lifetime (₹2999)</button>
      <h3>Special Offer</h3>
      <button class="pkg-btn" onclick="buyPackage('offer1')">3 Bottles (₹10)</button>
    </div>

    <script>
      // Firebase Initialization
      const firebaseConfig = {
        apiKey: "AIzaSyAnIsVCpPyE5084BXHPhDqqZG_9cmZE88c",
        authDomain: "watersort-puzzle-26317.firebaseapp.com",
        projectId: "watersort-puzzle-26317",
        storageBucket: "watersort-puzzle-26317.firebasestorage.app",
        messagingSenderId: "968212069598",
        appId: "1:968212069598:web:ddf8691012a96fa969164f"
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      const auth = firebase.auth();
      auth.signInAnonymously().catch((e) => console.error(e));

      // Shop Functions
      function openShop() { document.getElementById('shopModal').style.display = 'block'; }
      function closeShop() { document.getElementById('shopModal').style.display = 'none'; }

      const packages = {
        "c1": { name: "100 Coins", amount: 900 },
        "c2": { name: "1000 Coins", amount: 2900 },
        "c3": { name: "10000 Coins", amount: 9900 },
        "c4": { name: "100000 Coins", amount: 14900 },
        "c5": { name: "10000000 Coins", amount: 99900 },
        "ads1": { name: "No Ads 2 Months", amount: 9900 },
        "ads2": { name: "No Ads 4 Months", amount: 14900 },
        "ads3": { name: "No Ads 6 Months", amount: 19900 },
        "ads4": { name: "No Ads 1 Year", amount: 24900 },
        "ads5": { name: "Lifetime No Ads", amount: 299900 },
        "offer1": { name: "3 Bottles Special", amount: 1000 }
      };

      function buyPackage(pkgId) {
        const pkg = packages[pkgId];
        var options = {
          "key": "rzp_test_T6DmSrImWIjPkr", 
          "amount": pkg.amount,
          "currency": "INR",
          "name": "Water Sort Shop",
          "description": pkg.name,
          "handler": function (response) {
            updateUserDatabase(pkgId);
          }
        };
        new Razorpay(options).open();
      }

      function updateUserDatabase(pkgId) {
        const user = auth.currentUser;
        if(!user) { alert("Please login first!"); return; }
        
        // Database update logic
        if(pkgId.startsWith('c')) {
            const coins = {'c1':100,'c2':1000,'c3':10000,'c4':100000,'c5':10000000};
            db.collection("users").doc(user.uid).set({coins: firebase.firestore.FieldValue.increment(coins[pkgId])}, {merge:true});
        }
        alert("Payment Successful for " + packages[pkgId].name);
      }
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
